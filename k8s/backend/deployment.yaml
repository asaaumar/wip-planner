apiVersion: apps/v1
kind: Deployment
metadata:
  name: wip-planner-backend
  labels:
    app: wip-planner-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wip-planner-backend
      tier: backend
  template:
    metadata:
      labels:
        app: wip-planner-backend
        tier: backend
    spec:
      containers:
      - name: backend
        image: image-registry.openshift-image-registry.svc:5000/asaa-test/wip-planner-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          protocol: TCP
        env:
        - name: FRONTEND_URL
          value: "DEPLOYED FRONTEND URL"
        - name: DB_PATH
          value: "/app/data/wip_planner.db"
        volumeMounts:
        - name: db-storage
          mountPath: /app/data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: wip-planner-db


