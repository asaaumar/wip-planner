apiVersion: apps/v1
kind: Deployment
metadata:
  name: wip-planner-frontend
  labels:
    app: wip-planner-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wip-planner-frontend
      tier: frontend
  template:
    metadata:
      labels:
        app: wip-planner-frontend
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: image-registry.openshift-image-registry.svc:5000/asaa-test/wip-planner-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5


