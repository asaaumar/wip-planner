name: Deploy Frontend to OpenShift

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install OpenShift CLI
      run: |
        wget https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz
        tar -xzf openshift-client-linux.tar.gz
        sudo mv oc /usr/local/bin/
        sudo chmod +x /usr/local/bin/oc
        oc version
    
    - name: Login to OpenShift
      env:
        OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER }}
        OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
      run: |
        oc login --token=$OPENSHIFT_TOKEN --server=$OPENSHIFT_SERVER --insecure-skip-tls-verify
        oc project asaa-test
    
    - name: Build and Deploy Frontend
      env:
        BACKEND_URL: ${{ secrets.BACKEND_URL }}
      run: |
        cd frontend
        
        # Check if BuildConfig exists, create if not
        if ! oc get bc/wip-planner-frontend &> /dev/null; then
          echo "Creating BuildConfig..."
          oc new-build . --name=wip-planner-frontend --strategy=docker
        fi
        
        # Start build from current directory with backend URL
        oc start-build wip-planner-frontend \
          --from-dir=. \
          --build-arg REACT_APP_API_URL=$BACKEND_URL \
          --follow
        
        # Restart deployment to use new image
        oc rollout restart deployment/wip-planner-frontend
        
        # Wait for rollout to complete
        oc rollout status deployment/wip-planner-frontend --timeout=5m
    
    - name: Verify Deployment
      run: |
        echo "Frontend deployment completed!"
        oc get pods -l app=wip-planner-frontend
        FRONTEND_URL=$(oc get route wip-planner-frontend -o jsonpath='{.spec.host}')
        echo "Frontend URL: https://$FRONTEND_URL"


